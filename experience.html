<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>經歷 — 匿名用戶9487</title>
  <meta name="description" content="匿名用戶9487 的經歷頁面。" />
  <meta name="author" content="qwo877" />
  <meta name="theme-color" content="#0d2d52" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="經歷 — 匿名用戶9487" />
  <meta property="og:description" content="匿名用戶9487 的經歷頁面。" />
  <meta property="og:image" content="images/image14841987481.png" />

  <link id="dynamic-favicon" rel="icon" href="images/1276100847951941776.png">
  <link rel="stylesheet" href="style-e.css">
  <link rel="preload" as="image" href="images/星.webp" />

  <script src="common.js" defer></script>
  <script src="script-e.js" defer></script>
</head>
<body>
  <div id="navbar-mount"></div>

  <main class="scene" id="scene" role="button" tabindex="0" aria-label="點擊進入經歷">
    <!-- 縮放層 -->
    <div class="scene-bg" id="bg">
      <img class="scene-img" src="images/星.webp" alt="星空山景：北斗七星" decoding="async" />

      <!-- viewBox 對應圖片原生像素 3072×2048；座標直接取自圖片亮點，精準對齊 -->
      <svg class="overlay" id="overlay" viewBox="0 0 3072 2048"
           preserveAspectRatio="xMidYMin slice" aria-hidden="true">
        <defs>
          <!--圓形柔光核心-->
          <radialGradient id="gCore" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#ffffff" stop-opacity="1" />
            <stop offset="22%"  stop-color="#eaf2ff" stop-opacity=".95" />
            <stop offset="50%"  stop-color="#bcd3ff" stop-opacity=".5" />
            <stop offset="78%"  stop-color="#9fc0ff" stop-opacity=".18" />
            <stop offset="100%" stop-color="#9fc0ff" stop-opacity="0" />
          </radialGradient>
          <!--垂直光芒-->
          <linearGradient id="gV" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#cfe0ff" stop-opacity="0" />
            <stop offset="50%"  stop-color="#ffffff" stop-opacity="1" />
            <stop offset="100%" stop-color="#cfe0ff" stop-opacity="0" />
          </linearGradient>
          <!--水平光芒-->
          <linearGradient id="gH" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#cfe0ff" stop-opacity="0" />
            <stop offset="50%"  stop-color="#ffffff" stop-opacity="1" />
            <stop offset="100%" stop-color="#cfe0ff" stop-opacity="0" />
          </linearGradient>
          <!--星-->
          <g id="starShape">
            <circle cx="0" cy="0" r="100" fill="url(#gCore)" />
            <path d="M 0 -110 Q 0 0 20 0 Q 0 0 0 110 Q 0 0 -20 0 Q 0 0 0 -110 Z" fill="url(#gV)" />
            <path d="M -110 0 Q 0 0 0 20 Q 0 0 110 0 Q 0 0 0 -20 Q 0 0 -110 0 Z" fill="url(#gH)" />
          </g>
        </defs>

        <path class="lines" id="lines" pathLength="100"
              d="M 1123 345 L 1262 397 L 1389 448 L 1489 501 L 1623 469 L 1618 565 L 1523 585 L 1489 501" />

        <!-- 每顆星的配置 -->
        <use class="star" href="#starShape" transform="translate(1123 345) scale(1.00)" style="--d:0s;    filter:saturate(1.6) hue-rotate(8deg) brightness(1.10)" />
        <use class="star" href="#starShape" transform="translate(1262 397) scale(0.62)" style="--d:-2.4s; filter:saturate(1.2) brightness(0.95)" />
        <use class="star" href="#starShape" transform="translate(1389 448) scale(0.90)" style="--d:-1.2s; filter:sepia(.45) saturate(1.8) brightness(1.05)" />
        <use class="star" href="#starShape" transform="translate(1489 501) scale(0.60)" style="--d:-3.6s; filter:saturate(1.5) hue-rotate(14deg) brightness(0.85)" />
        <use class="star" href="#starShape" transform="translate(1623 469) scale(0.70)" style="--d:-0.8s; filter:sepia(.6) saturate(2) brightness(1.08)" />
        <use class="star" href="#starShape" transform="translate(1618 565) scale(1.00)" style="--d:-3.0s; filter:saturate(1.4) hue-rotate(6deg)" />
        <use class="star" href="#starShape" transform="translate(1523 585) scale(0.95)" style="--d:-1.8s; filter:sepia(.3) saturate(1.5) brightness(0.98)" />
      </svg>
    </div>

    <div class="enter-hint" id="enterHint">點擊任意處 · 進入經歷</div>

    <!--跳轉目的層 代辦-->
    <section class="next" id="next" aria-hidden="true">
      <h2>經 歷</h2>
      <p>EXPERIENCE</p>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">網頁維護中</div>
</body>
</html>
