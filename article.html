  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>

  <!-- marked.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js" defer></script>

  <style>
    :root {
      --accent: #9dffff;
      --accent-dim: rgba(157, 255, 255, 0.15);

      --space-xs: clamp(0.4rem,  1vw,  0.65rem);
      --space-sm: clamp(0.75rem, 2vw,  1rem);
      --space-md: clamp(1rem,    3vw,  1.5rem);
      --space-lg: clamp(1.5rem,  4vw,  2.5rem);
      --space-xl: clamp(2rem,    5vw,  3.5rem);

      --text-sm:  clamp(0.78rem, 1.8vw, 0.9rem);
      --text-base:clamp(0.9rem,  2.2vw, 1.05rem);
      --text-lg:  clamp(1.05rem, 2.5vw, 1.25rem);
      --text-xl:  clamp(1.3rem,  3.5vw, 1.75rem);
      --text-2xl: clamp(1.6rem,  4.5vw, 2.4rem);
    }

    html, body {
      background-attachment: fixed;
    }

    .container {
      display: block;
      height: auto;
      min-height: 100vh;
    }

    .forum-body {
      max-width: min(940px, 92vw);
      margin: 0 auto;
      padding: calc(95px + var(--space-xl)) var(--space-md) calc(140px + var(--space-xl));
    }

    .list-header { margin-bottom: var(--space-lg); }

    .list-header h1 {
      font-size: var(--text-2xl);
      font-weight: bold;
      color: var(--accent);
      margin-bottom: var(--space-xs);
    }

    .list-header p {
      font-size: var(--text-base);
      color: #d1e6f2;
    }

    .filter-bar {
      display: flex;
      gap: var(--space-sm);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
    }

    .filter-bar input,
    .filter-bar select {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(157,255,255,0.25);
      border-radius: 8px;
      color: #d1e6f2;
      font-size: var(--text-base);
      font-family: inherit;
      padding: 0.55em 1em;
      outline: none;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s;
    }

    .filter-bar input { flex: 1 1 200px; min-width: 0; }
    .filter-bar input::placeholder { color: #82b3b3; }
    .filter-bar input:focus,
    .filter-bar select:focus { border-color: var(--accent); }
    .filter-bar select option { background: #0d2d52; color: #d1e6f2; }

    #article-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr));
      gap: var(--space-md);
    }

    .article-card {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      background: rgba(13,45,82,0.55);
      border: 1px solid rgba(157,255,255,0.18);
      border-radius: 14px;
      padding: var(--space-md);
      backdrop-filter: blur(10px);
      text-decoration: none;
      color: inherit;
      cursor: url('images/木槌.png') 16 16, pointer;
      transition: border-color 0.25s, transform 0.25s, background 0.25s;
      position: relative;
      overflow: hidden;
    }

    .article-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-dim), transparent 65%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .article-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      background: rgba(13,45,82,0.72);
    }

    .article-card:hover::after { opacity: 1; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-xs);
      flex-wrap: wrap;
    }

    .card-tags { display: flex; flex-wrap: wrap; gap: 0.3em; }

    .tag {
      font-size: var(--text-sm);
      background: rgba(157,255,255,0.22);
      color: var(--accent);
      border: 1px solid rgba(157,255,255,0.45);
      border-radius: 999px;
      padding: 0.15em 0.7em;
      font-family: monospace;
    }

    .card-date { font-size: var(--text-sm); color: #82b3b3; white-space: nowrap; }

    .card-title {
      font-size: var(--text-lg);
      font-weight: bold;
      color: #e2f4f4;
      line-height: 1.4;
      margin: 0;
    }

    .card-desc {
      font-size: var(--text-base);
      color: #a8c8c8;
      line-height: 1.6;
      margin: 0;
      flex: 1;
    }

    .card-arrow {
      font-size: var(--text-sm);
      color: var(--accent);
      font-family: monospace;
      margin-top: var(--space-xs);
      transition: letter-spacing 0.2s;
    }

    .article-card:hover .card-arrow { letter-spacing: 0.06em; }

    .no-result {
      color: #82b3b3;
      font-size: var(--text-base);
      padding: var(--space-lg);
      text-align: center;
      grid-column: 1 / -1;
    }

    #content-view .forum-body { max-width: min(1000px, 92vw); }

    .article-glass {
      background: rgba(13, 45, 82, 0.6);
      border: 1px solid rgba(157,255,255,0.2);
      border-radius: 16px;
      padding: var(--space-lg) var(--space-xl);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    #back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      font-size: var(--text-sm);
      color: var(--accent);
      background: rgba(157,255,255,0.08);
      border: 1px solid rgba(157,255,255,0.4);
      border-radius: 999px;
      cursor: url('images/木槌.png') 16 16, pointer;
      font-family: inherit;
      margin-bottom: var(--space-lg);
      padding: 0.35em 1em;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    #back-btn:hover {
      background: rgba(157,255,255,0.18);
      border-color: var(--accent);
      color: #fff;
    }

    .article-header {
      margin-bottom: var(--space-lg);
      padding-bottom: var(--space-md);
      border-bottom: 2px solid rgba(157,255,255,0.45);
    }

    #article-title {
      font-size: var(--text-2xl);
      font-weight: bold;
      color: var(--accent);
      line-height: 1.3;
      margin-bottom: var(--space-sm);
    }

    #article-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-xs);
      font-size: var(--text-sm);
      color: #82b3b3;
    }

    #article-meta .sep { opacity: 0.4; }

    #article-toc {
      background: rgba(13,45,82,0.55);
      border: 1px solid rgba(157,255,255,0.18);
      border-radius: 12px;
      padding: var(--space-md);
      margin-bottom: var(--space-lg);
      backdrop-filter: blur(10px);
    }

    #article-toc:empty { display: none; }

    #article-toc::before {
      content: '# 目錄';
      display: block;
      font-size: var(--text-sm);
      font-family: monospace;
      color: var(--accent);
      margin-bottom: var(--space-sm);
    }

    #article-toc ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.35em; }
    #article-toc a { font-size: var(--text-sm); color: #a8c8c8; text-decoration: none; transition: color 0.2s; }
    #article-toc a:hover { color: var(--accent); }
    .toc-h3 { padding-left: 1.2em; }

    #article-content { font-size: var(--text-base); color: #d1e6f2; line-height: 1.8; }

    #article-content h1,
    #article-content h2,
    #article-content h3,
    #article-content h4 { color: var(--accent); font-weight: bold; line-height: 1.3; margin: 2em 0 0.6em; }

    #article-content h1 { font-size: var(--text-2xl); }
    #article-content h2 { font-size: var(--text-xl); padding-bottom: 0.4em; border-bottom: 2px solid rgba(157,255,255,0.4); }
    #article-content h3 { font-size: var(--text-lg); }

    #article-content p  { margin: 0 0 1.2em; color: #c2dada; }
    #article-content strong { color: #e2f4f4; }
    #article-content a  { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
    #article-content ul,
    #article-content ol { padding-left: 1.5em; margin-bottom: 1.2em; color: #c2dada; }
    #article-content li { margin-bottom: 0.4em; }

    #article-content code:not(pre code) {
      font-family: monospace;
      font-size: 0.88em;
      background: rgba(157,255,255,0.1);
      color: var(--accent);
      border-radius: 4px;
      padding: 0.15em 0.45em;
    }

    #article-content pre {
      border-radius: 10px;
      overflow: auto;
      margin: var(--space-md) 0;
      font-size: var(--text-sm);
      border: 1px solid rgba(157,255,255,0.15);
    }

    #article-content pre code { font-family: monospace; }

    #article-content blockquote {
      border-left: 3px solid var(--accent);
      margin: var(--space-md) 0;
      padding: var(--space-sm) var(--space-md);
      background: rgba(13,45,82,0.5);
      border-radius: 0 8px 8px 0;
      color: #a8c8c8;
      font-style: italic;
    }
    #article-content hr { border: none; border-top: 2px solid rgba(157,255,255,0.4); margin: var(--space-lg) 0; }

    #article-content table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); margin-bottom: var(--space-md); }
    #article-content th,
    #article-content td { padding: 0.6em 1em; border: 1px solid rgba(157,255,255,0.15); text-align: left; }
    #article-content th { background: rgba(13,45,82,0.7); color: var(--accent); font-family: monospace; }

    .error-msg { color: #f87171; font-size: var(--text-base); padding: var(--space-lg) 0; }

    @media (max-width: 600px) {
      .filter-bar { flex-direction: column; }
      .filter-bar input, .filter-bar select { width: 100%; }
    }
  </style>
</head>
